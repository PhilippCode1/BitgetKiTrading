# CI — Shell, Release-Sanity, Ruff, Black, Mypy, Schema, Migrate, Pytest (Coverage),
# pip/pnpm Audit, Dashboard (Jest/Build/Types), Docker Compose + Health + KI-Smoke,
# Playwright E2E, zentraler release-approval-gate (braucht alle o.g. + Freeze+Version-Check)
#
# Playwright (pnpm e2e): Job `compose_healthcheck` — fehlgeschlagener Schritt = Exit 1, Job rot.
# Job `release-approval-gate` braucht: python, dashboard, compose_healthcheck; bei
# wöchentlichem Schedule entfällt E2E (Job skipped) und das Gate wertet das als erlaubt
# (Merge/PR-Checks weiterhin: alle drei grün, siehe step „Upstream-Jobs prüfen“).
# Branch-Protection: im Remote `release-approval-gate` als required status eintragen.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Montag 05:00 UTC — Python + Dashboard; Compose-Job ist ausgeschlossen (siehe if unten)
    - cron: "0 5 * * 1"

jobs:
  python:
    name: Python (Ruff, pytest, contracts, modul_mate, pip-audit, …)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_DB: ci_dummy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_dummy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Env profile validation (Beispiel-ENV mit CI-Platzhalter-Ersatz)
        run: |
          set -euo pipefail
          python3 tools/render_ci_env_example.py --input .env.local.example --output /tmp/ci.env.local
          python3 tools/validate_env_profile.py --env-file /tmp/ci.env.local --profile local

      - name: ENV-Profile Templates (shadow, production --template)
        run: |
          set -euo pipefail
          python3 tools/validate_env_profile.py --env-file .env.shadow.example --profile shadow --template
          python3 tools/validate_env_profile.py --env-file .env.production.example --profile production --template

      - name: Shell scripts (Syntax)
        run: >-
          bash -n scripts/start_all.sh scripts/healthcheck.sh scripts/deploy.sh
          scripts/integration_compose_smoke.sh scripts/wait_compose_healthy.sh
          scripts/rc_health.sh tools/run_tests.sh

      - name: Release sanity (Secrets / Ballast / Compose-Bindings)
        run: python tools/release_sanity_checks.py

      - name: Prod/Shadow ENV template security gate
        run: python3 tools/check_production_env_template_security.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"
          cache: pip

      - name: "Install packages (gepinnt: requirements-dev + editables)"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -c constraints-runtime.txt -e ./shared/python
          pip install -c constraints-runtime.txt -e ./services/feature-engine
          pip install -c constraints-runtime.txt -e ./services/signal-engine
          pip install -c constraints-runtime.txt -e ./services/paper-broker
          pip install -c constraints-runtime.txt -e ./services/structure-engine
          pip install -c constraints-runtime.txt -e ./services/drawing-engine
          pip install -c constraints-runtime.txt -e ./services/learning-engine
          pip install -c constraints-runtime.txt -e ./services/api-gateway
          pip install -c constraints-runtime.txt -e ./services/monitor-engine
          pip install -c constraints-runtime.txt -e ./services/news-engine
          pip install -c constraints-runtime.txt -e ./services/market-stream
          pip install -c constraints-runtime.txt -e ./services/llm-orchestrator
          pip install -c constraints-runtime.txt -e ./services/alert-engine
          pip install -c constraints-runtime.txt -e ./services/live-broker

      - name: Ruff (tests, tools, integration inkl. fixtures)
        run: >-
          ruff check tests/unit tests/unit/scripts tests/config tests/integration tests/signal_engine tests/shared
          tests/docs/test_no_go_rules_contract.py
          tests/security/test_owner_release_gitignore_contract.py
          tests/tools/test_ci_workflow_evidence_gates.py
          tests/tools/test_ci_yml_mandatory_jobs_contract.py
          tests/paper_broker tests/fixtures tests/conftest.py
          tests/integration/fixtures config/required_secrets.py config/bootstrap.py
          tools/check_schema.py tools/check_contracts.py
          tools/check_coverage_gates.py tools/release_sanity_checks.py
          tools/validate_env_profile.py tools/pip_audit_supply_chain_gate.py
          tools/check_production_env_template_security.py
          tools/check_ai_operator_assistant_safety.py
          tools/modul_mate_selfcheck.py tools/production_selfcheck.py
          scripts/release_gate.py
          tools/local_stack_doctor.py
          tools/run_llm_eval.py
          tools/validate_eval_baseline.py
          tools/check_release_approval_gates.py
          tools/check_github_branch_protection.py
          scripts/branch_protection_ci_evidence_report.py
          tools/dr_postgres_restore_drill.py
          tools/verify_alert_routing.py
          scripts/verify_shadow_burn_in.py

      - name: LLM eval baseline manifest (Prompt 5)
        run: python tools/validate_eval_baseline.py

      - name: Black (ohne tests/unit — Legacy-Format dort)
        run: >-
          black --check tests/integration tests/signal_engine tests/shared
          tests/unit/scripts tests/paper_broker tests/conftest.py tests/fixtures tools/check_schema.py
          tools/check_contracts.py tools/check_coverage_gates.py tools/release_sanity_checks.py
          tools/validate_env_profile.py tools/pip_audit_supply_chain_gate.py
          tools/check_production_env_template_security.py
          tools/modul_mate_selfcheck.py tools/production_selfcheck.py
          scripts/release_gate.py
          tools/local_stack_doctor.py
          tools/run_llm_eval.py
          tools/validate_eval_baseline.py
          tools/check_release_approval_gates.py
          tools/check_github_branch_protection.py
          scripts/branch_protection_ci_evidence_report.py
          tools/dr_postgres_restore_drill.py
          tools/verify_alert_routing.py
          scripts/verify_shadow_burn_in.py

      - name: Mypy (kritische shared_py-Module, strict package)
        working-directory: shared/python
        run: >-
          mypy src/shared_py/leverage_allocator.py src/shared_py/risk_engine.py
          src/shared_py/exit_engine.py src/shared_py/shadow_live_divergence.py
          src/shared_py/product_policy.py src/shared_py/modul_mate_db_gates.py
          src/shared_py/model_layer_contract.py

      - name: Packaging smoke (shared-py Wheel)
        run: |
          python -m build shared/python --wheel --outdir dist/ci-wheels
          python -c "import glob,zipfile; w=sorted(glob.glob('dist/ci-wheels/*.whl')); assert w, 'no wheel'; z=zipfile.ZipFile(w[0]); print('wheel:', w[0]); print('\\n'.join(z.namelist()[:25]))"

      - name: Schema check (Fixture)
        run: |
          python tools/check_schema.py \
            --schema infra/tests/schemas/signals_recent_response.schema.json \
            --json_file tests/fixtures/signals_fixture.json

      - name: Shared contracts (Katalog, Envelope-Schema, shared_py)
        run: python tools/check_contracts.py

      - name: Evidence-Matrix 10/10 + Status-Report-Sync (Schema, keine Drift)
        run: >-
          python tools/check_10_10_evidence.py
          --check-report docs/production_10_10/evidence_status_report.md

      - name: Live-Broker Preflight-Matrix (strikt, repo-lokal)
        run: python tools/check_live_broker_preflight.py --strict

      - name: DB migrations (infra/migrate.py)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_dummy
        run: python infra/migrate.py

      - name: Modul Mate gates selfcheck (nach Migrationen)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_dummy
        run: python tools/modul_mate_selfcheck.py

      - name: Pytest unit + Coverage (Basis)
        env:
          CI: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_dummy
          REDIS_URL: redis://localhost:6379/0
        run: |
          coverage erase
          coverage run -m pytest tests shared/python/tests -m "not integration"

      - name: Pytest integration + Coverage (append — Stack-Smokes / DB-Recovery)
        env:
          CI: "true"
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_dummy
          TEST_REDIS_URL: redis://localhost:6379/1
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_dummy
          REDIS_URL: redis://localhost:6379/0
        run: |
          coverage run -a -m pytest tests/integration tests/learning_engine -m integration -q

      - name: "Coverage quality gates (blockierend) + XML"
        env:
          CI: "true"
        run: |
          set -euo pipefail
          python tools/check_coverage_gates.py
          coverage xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - uses: actions/upload-artifact@v4
        with:
          name: shared-py-wheel
          path: dist/ci-wheels/*.whl
          if-no-files-found: warn

      - name: pip-audit supply-chain gate (CVSS>=7 / OSV HIGH+, Allowlist)
        run: |
          python -m pip install pip-audit==2.7.3 cvss==3.2
          python tools/pip_audit_supply_chain_gate.py

      - name: Branch-Protection + CI-Pflichtjobs (strikt, lokales Repo)
        run: |
          set -euo pipefail
          python3 scripts/branch_protection_ci_evidence_report.py --strict \
            --output-md reports/branch_protection_ci_evidence.md \
            --output-json reports/branch_protection_ci_evidence.json

      - name: Alert-Routing (Alertmanager-Beispiel + Prometheus-Regeln, strikt)
        run: |
          set -euo pipefail
          python3 tools/verify_alert_routing.py --strict \
            --report-md reports/alert_routing_verify.md

      - name: Branch-Protection-Tool (informativ, kein blockierendes Grün ohne API)
        run: python3 tools/check_github_branch_protection.py --repo "${{ github.repository }}"
        continue-on-error: true

  demo-env-compose-safety:
    name: Demo ENV Compose Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: CI gate report (Demo ENV + Compose)
        run: |
          python scripts/ci_demo_env_compose_gate.py \
            --env-file .env.demo.example \
            --no-full-config \
            --output-md reports/ci_demo_env_compose_gate.md \
            --output-json reports/ci_demo_env_compose_gate.json
      - name: Compose config --services (wenn Docker Compose verfuegbar)
        shell: bash
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            docker compose --env-file .env.demo.example config --services >/dev/null
          else
            echo "docker compose nicht verfuegbar; Schritt wird als skipped behandelt."
          fi
      - name: Demo ENV gate tests
        run: pytest tests/scripts/test_ci_demo_env_compose_gate.py -q
      - name: Demo ENV profile coverage
        run: pytest tests/unit/config/test_env_profiles.py -q
      - name: Demo stack healthcheck tests
        run: pytest tests/scripts/test_demo_stack_healthcheck.py -q
      - name: Demo stress smoke tests
        run: pytest tests/scripts/test_demo_stress_smoke.py -q
      - name: Demo lifecycle evidence tests
        run: pytest tests/scripts/test_demo_lifecycle_evidence_report.py -q
      - name: Demo lifecycle live-block safety
        run: pytest tests/security/test_demo_lifecycle_never_enables_live.py -q
      - name: Demo evidence not live-verified safety
        run: pytest tests/security/test_demo_evidence_does_not_count_as_live_verified.py -q
      - uses: actions/upload-artifact@v4
        with:
          name: ci-demo-env-compose-gate
          path: |
            reports/ci_demo_env_compose_gate.md
            reports/ci_demo_env_compose_gate.json
          if-no-files-found: error

  dashboard:
    name: Dashboard (types, Jest, build, pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.6"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install (Monorepo-Lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck (turbo, dashboard + shared-ts)
        run: pnpm check-types
      - name: Dashboard i18n-Keys (release_sanity; tsc+Jest via Turbo + test:ci)
        env:
          RELEASE_SANITY_DASHBOARD_NO_DUP_TSC: "1"
          RELEASE_SANITY_DASHBOARD_NO_DUP_JEST: "1"
        run: python3 tools/release_sanity_checks.py --only-dashboard-pnpm
      - name: Prettier (Repo-Root, wie pnpm format:check)
        run: >-
          pnpm exec prettier --check
          .github/workflows/ci.yml
          package.json
          apps/dashboard/package.json
      - name: Dashboard test + build
        run: |
          pnpm --dir apps/dashboard run test:ci
          pnpm --dir apps/dashboard run build

      - name: pnpm audit (Supply-Chain, high+ — Gate)
        run: pnpm audit --audit-level=high --prod

  compose_healthcheck:
    if: github.event_name != 'schedule'
    name: Docker Compose + Health + KI-Smoke + Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - name: Prepare .env.local (ersetzt Platzhalter fuer Compose)
        run: |
          set -euo pipefail
          sed 's/<SET_ME>/ci_repeatable_secret_min_32_chars_x/g' .env.local.example > .env.local
      - name: Docker Compose config validate
        run: >-
          docker compose --env-file .env.local -f docker-compose.yml -f docker-compose.local-publish.yml
          config --quiet
      - name: Docker Compose (Build + Up)
        run: >-
          docker compose --env-file .env.local -f docker-compose.yml -f docker-compose.local-publish.yml
          up -d --build postgres redis api-gateway dashboard
      - name: Healthcheck (Minimal-Stack Retry bis API+Dashboard ready)
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 40); do
            sleep 10
            if curl -fsS http://127.0.0.1:8000/health >/dev/null && curl -fsSI http://127.0.0.1:3000 >/dev/null; then
              echo "minimal stack healthcheck OK after round $i"
              exit 0
            fi
            echo "round $i: API/Dashboard noch nicht ready, warte..."
          done
          echo "=== docker compose ps (minimal stack) ==="
          docker compose --env-file .env.local -f docker-compose.yml -f docker-compose.local-publish.yml ps || true
          exit 1
      - uses: pnpm/action-setup@v4
        if: success()
      - uses: actions/setup-node@v4
        if: success()
        with:
          node-version: "20.19.6"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: "Playwright Release-Gate (Nutzerreisen, Dashboard :3000)"
        if: success()
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm exec playwright install chromium --with-deps
          pnpm e2e

  # Zentrales Merge-Release: alle parallelen Quality-Jobs (Python+Dashboard+Compose/E2E)
  # + REPO-Freeze (P0/P1 OPEN) + einheitliche Root-Version (package.json/pyproject).
  release-approval-gate:
    name: Unified Release Gate (all jobs + FREEZE + version lock)
    if: always()
    needs:
      - python
      - demo-env-compose-safety
      - dashboard
      - compose_healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upstream-Job-Ergebnisse pruefen
        run: |
          set -euo pipefail
          p="${{ needs.python.result }}"
          s="${{ needs.demo-env-compose-safety.result }}"
          d="${{ needs.dashboard.result }}"
          c="${{ needs.compose_healthcheck.result }}"
          ev="${{ github.event_name }}"
          echo "python=$p demo_safety=$s dashboard=$d compose/e2e=$c event=$ev"
          if [ "$p" != "success" ]; then echo "FAIL: python-Job war nicht gruen"; exit 1; fi
          if [ "$s" != "success" ]; then echo "FAIL: demo-env-compose-safety-Job war nicht gruen"; exit 1; fi
          if [ "$d" != "success" ]; then echo "FAIL: dashboard-Job war nicht gruen"; exit 1; fi
          if [ "$c" = "failure" ] || [ "$c" = "cancelled" ]; then echo "FAIL: compose/e2e-Job fehlgeschlagen"; exit 1; fi
          if [ "$c" = "success" ]; then
            echo "E2E/Compose gruen"
            exit 0
          fi
          if [ "$c" = "skipped" ] && [ "$ev" = "schedule" ]; then
            echo "INFO: E2E auf schedule ausgelassen (OK fuer Zeitplan-Job)"; exit 0
          fi
          echo "FAIL: compose/e2e-Job wurde nicht ausgefuehren (erwartet bei PR/push, nicht 'skipped')"; exit 1

      - name: REPO-Freeze (P0/P1 OPEN) + Monorepo-Versions-Einheit
        run: python3 tools/check_release_approval_gates.py
