# Vorlage: TLS am nginx, Upstreams zu Docker-Published-Ports auf 127.0.0.1
# Pfade und server_name ersetzen; certbot oder manuelle PEM-Pfade.
#
# Load-Balancer / externe Healthchecks (optional eigene location, kleines Timeout):
#   API:     proxy_pass http://127.0.0.1:8000/health;
#   Dashboard: proxy_pass http://127.0.0.1:3000/api/health;
# Siehe docs/OPERATOR_HANDBOOK.md

upstream bitget_api_gateway {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream bitget_dashboard {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP -> HTTPS (anpassen)
server {
    listen 80;
    server_name api.example.com dashboard.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/ssl/certs/api.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/api.example.com.key;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://bitget_api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 443 ssl http2;
    server_name dashboard.example.com;

    ssl_certificate     /etc/ssl/certs/dashboard.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/dashboard.example.com.key;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://bitget_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
    }
}
