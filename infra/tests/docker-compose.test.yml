version: "3.9"

# Isolierte Postgres/Redis fuer Integrationstests (Prompt 29).
# Start: docker compose -f infra/tests/docker-compose.test.yml up -d
# TEST_DATABASE_URL=postgresql://postgres:testpass@localhost:5433/bitget_test
# TEST_REDIS_URL=redis://localhost:6380/1

name: bitget-btc-ai-test

services:
  postgres-test:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: bitget_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitget_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis-test:
    image: redis:7.4.2-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
