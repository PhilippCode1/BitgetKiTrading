      - "BITGET_MARGIN_DEFAULT_LOAN_TYPE"
      - "BITGET_PRODUCT_TYPE"
      - "BITGET_MARGIN_ACCOUNT_MODE"
      - "BITGET_DISCOVERY_SYMBOLS"
      - "BITGET_SYMBOL"
      - "BITGET_DEMO_ENABLED"
      - "BITGET_DEMO_REST_BASE_URL"
      - "BITGET_DEMO_WS_PUBLIC_URL"
      - "BITGET_DEMO_PAPTRADING_HEADER"
      - "INSTRUMENT_CATALOG_REFRESH_INTERVAL_SEC"
      - "INSTRUMENT_CATALOG_CACHE_TTL_SEC"
