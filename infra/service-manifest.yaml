version: "1.0"
project: "bitget-btc-ai"
defaults:
  language: "de"
  runtime:
    python: "3.11"
    node: "20"
  env_files:
    - ".env.local"
    - ".env.shadow"
    - ".env.production"
    - ".env.test"
  env_files_note: "Laufzeit: CONFIG_ENV_FILE/COMPOSE_ENV_FILE/APP_ENV — siehe docs/env_profiles.md; kein statisches Tuple beim Modul-Import."
  env_resolution:
    order:
      - "CONFIG_ENV_FILE"
      - "COMPOSE_ENV_FILE"
      - "ENV_PROFILE_FILE"
      - "STACK_PROFILE"
      - "APP_ENV"
      - ".env.local fallback"
  security:
    secrets_in_repo: false
    note: "Alle Secrets nur ueber ENV / Secret Manager. Niemals committen."
compose_runtime:
  primary_file: docker-compose.yml
  local_host_ports_overlay: docker-compose.local-publish.yml
  env_file_switch: COMPOSE_ENV_FILE
  docker_network: bitget_ai_net
  documentation: docs/compose_runtime.md
  edge_host_publish:
    api-gateway: 8000
    dashboard: 3000
  observability:
    profile: observability
    prometheus_port: 9090
    grafana_port: 3001
  internal_pipeline:
    note: "Im Basis-Compose keine Host-Port-Mappings fuer Engines/Broker/Learning/Alert/Monitor — nur Docker-intern. Overlay local-publish fuer Dev/CI."
  readiness:
    env_peer_urls: READINESS_REQUIRE_URLS
    env_peer_timeout: READINESS_PEER_TIMEOUT_SEC
    monitor_boot_grace: MONITOR_READINESS_BOOT_GRACE_MS
    documentation: docs/stack_readiness.md
infrastructure:
  - name: postgres
    compose_service: postgres
    image: "postgres:16.6-alpine"
    container_port: 5432
  - name: redis
    compose_service: redis
    image: "redis:7.4.2-alpine"
    container_port: 6379
services:
  - name: "api-gateway"
    folder: "services/api-gateway"
    purpose: "Zentrale HTTP/WebSocket Schnittstelle fuers Dashboard; Routing zu internen Services."
    entrypoint: "services/api-gateway/src/api_gateway/app.py"
    exposes:
      http_port: 8000
      host_publish: true
    depends_on:
      - "postgres"
      - "redis"
      - "market-stream"
      - "feature-engine"
      - "structure-engine"
      - "drawing-engine"
      - "signal-engine"
      - "news-engine"
      - "llm-orchestrator"
      - "paper-broker"
      - "learning-engine"
      - "alert-engine"
      - "live-broker"
    required_env:
      - "APP_ENV"
      - "APP_PORT"
      - "DATABASE_URL"
      - "REDIS_URL"
      - "EVENTBUS_DEFAULT_BLOCK_MS"
      - "EVENTBUS_DEFAULT_COUNT"
      - "EVENTBUS_DEDUPE_TTL_SEC"
      - "HEALTH_URL_MARKET_STREAM"
      - "HEALTH_URL_FEATURE_ENGINE"
      - "HEALTH_URL_STRUCTURE_ENGINE"
      - "HEALTH_URL_DRAWING_ENGINE"
      - "HEALTH_URL_SIGNAL_ENGINE"
      - "HEALTH_URL_NEWS_ENGINE"
      - "HEALTH_URL_LLM_ORCHESTRATOR"
      - "HEALTH_URL_PAPER_BROKER"
      - "HEALTH_URL_LEARNING_ENGINE"
      - "HEALTH_URL_ALERT_ENGINE"
      - "HEALTH_URL_MONITOR_ENGINE"
      - "HEALTH_URL_LIVE_BROKER"
      - "LOG_LEVEL"

