      - "EVENTBUS_DEDUPE_TTL_SEC"
      - "INSTRUMENT_CATALOG_REFRESH_INTERVAL_SEC"
      - "INSTRUMENT_CATALOG_CACHE_TTL_SEC"
      - "INSTRUMENT_CATALOG_MAX_STALE_SEC"
      - "DATABASE_URL"
      - "LOG_LEVEL"
    operational_constraints:
      websocket_rate_limit_msg_per_sec: 10
      reconnect_required: true
      rest_fallback_required: true
      note: "Bitget WS max 10 msg/s inklusive ping und subscribe; private Kanaele koennen Message-Loss haben, REST Fallback ist empfohlen, und waehrend Releases sind Disconnects moeglich. Zusaetzliche ENV (Defaults im Code): MARKET_STREAM_WS_STALE_AFTER_SEC, MARKET_STREAM_STALE_ESCALATION_MAX_CYCLES, MARKET_STREAM_READY_MAX_DATA_AGE_SEC, MARKET_STREAM_READY_BOOT_GRACE_SEC, MARKET_STREAM_READY_REQUIRE_FRESH_TRADES, MARKET_STREAM_FEED_HEALTH_INTERVAL_SEC. Downstream: events:market_feed_health, /ready -> data_freshness."

