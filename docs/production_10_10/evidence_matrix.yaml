categories:
  - id: private_owner_scope
    title: Private Owner Scope
    description: Philipp Crljic ist einziger Admin, Operator und Owner; Verkauf, Kunden, Mandanten, Billing und Payment sind nicht Produktziel.
    target_10_10: Der private Scope ist dokumentiert, maschinenlesbar referenziert und in weiteren Arbeiten verbindlich.
    required_evidence:
      - Private-Owner-Entscheidung im Root- und Production-Scope dokumentiert.
      - Billing-, Customer-, Sales- und Tenant-Verkaufsziele sind ausgeschlossen.
    evidence_files:
      - AGENTS.md
      - docs/production_10_10/private_owner_scope.md
      - docs/production_10_10/README.md
    required_commands:
      - python tools/check_10_10_evidence.py
    status: verified
    blocks_live_trading: false
    severity: P1
    owner_role: Owner / Product Architecture
    next_action: Scope bei jeder UI- und Trading-Aenderung gegenpruefen.
    notes: Reduziert keine Live-Sicherheitsanforderung.

  - id: main_console_information_architecture
    title: Main Console Information Architecture
    description: Die deutsche Main Console ist die zentrale Arbeitsoberflaeche fuer Status, Assets, Signale, Risk, Live-Broker, Reports, Alerts und Go/No-Go.
    target_10_10: Alle relevanten Funktionen sind logisch erreichbar, doppelte Seiten sind inventarisiert und Live-Zustaende sind eindeutig sichtbar.
    required_evidence:
      - Main-Console-Zielbild dokumentiert.
      - Dashboard-Routen inventarisiert.
      - BFF/API-Verdrahtung der Pflichtkarten inklusive Loading/Error/Empty dokumentiert.
      - Konsolidierungsplan mit Tests vorhanden.
    evidence_files:
      - docs/production_10_10/main_console_product_direction.md
      - docs/production_10_10/main_console_bff_api_wiring.md
      - docs/dashboard_pages.md
      - docs/dashboard_operator.md
      - tools/check_main_console_wiring.py
      - tests/tools/test_check_main_console_wiring.py
    required_commands:
      - python tools/check_main_console_wiring.py --strict
      - pnpm --dir apps/dashboard test
      - pnpm e2e
    status: implemented
    blocks_live_trading: true
    severity: P1
    owner_role: Product Architecture / UI Engineering
    next_action: Dashboard-Routen inventarisieren und Main-Console-Konsolidierungsplan erzeugen.
    notes: Ohne eindeutige Operator-Sicht bleibt Live-Go/No-Go blockiert.

  - id: german_only_ui
    title: German-only UI
    description: Die finale Anwendung fuehrt Philipp auf Deutsch; neue UI-Texte duerfen keine englische Produktfuehrung einfuehren.
    target_10_10: Alle sichtbaren Main-Console-Texte, Warnungen und Freigaben sind deutsch oder bewusst als technische Fachbegriffe dokumentiert.
    required_evidence:
      - UI-Textinventar.
      - Test oder Scanner fuer neue englische UI-Texte.
      - Owner-UAT der deutschen Main Console.
    evidence_files:
      - docs/production_10_10/main_console_product_direction.md
      - docs/dashboard_operator.md
    required_commands:
      - pnpm --dir apps/dashboard test
    status: partial
    blocks_live_trading: true
    severity: P1
    owner_role: UI/UX / Owner UAT
    next_action: UI-Textscanner und deutsche Main-Console-Copy-Review ergaenzen.
    notes: Englische Legacy-Texte sind als Konsolidierungsrisiko zu behandeln.

  - id: bitget_asset_universe
    title: Bitget Asset Universe
    description: Das System ist nicht BTC-only, sondern arbeitet mit einem kontrollierten Bitget-Marktuniversum.
    target_10_10: Spot, Margin und Futures werden family-aware modelliert und unbekannte Assets fallen auf no-trade/no-subscribe.
    required_evidence:
      - Bitget-Marktuniversum dokumentiert.
      - Asset-Familien technisch abgebildet.
      - Live-Gates pro Asset-Familie getestet.
    evidence_files:
      - README.md
      - docs/bitget-config.md
      - docs/production_10_10/bitget_asset_universe.md
      - docs/production_10_10/instrument_catalog_contract.md
      - shared/python/src/shared_py/bitget/asset_universe.py
      - shared/python/src/shared_py/bitget/instruments.py
      - scripts/refresh_bitget_asset_universe.py
      - tools/check_bitget_asset_universe.py
      - tests/shared/test_bitget_asset_universe.py
      - tests/tools/test_check_bitget_asset_universe.py
      - tests/security/test_bitget_asset_universe_contracts.py
    required_commands:
      - python scripts/refresh_bitget_asset_universe.py --dry-run
      - python scripts/refresh_bitget_asset_universe.py --input-json tests/fixtures/bitget_asset_universe_sample.json --output-json reports/bitget_asset_universe_sample.json --output-md reports/bitget_asset_universe_sample.md
      - python tools/check_bitget_asset_universe.py --strict
      - pytest tests/shared/test_bitget_asset_universe.py -q
      - pytest tests/tools/test_check_bitget_asset_universe.py -q
      - pytest tests/security/test_bitget_asset_universe_contracts.py -q
    status: implemented
    blocks_live_trading: true
    severity: P0
    owner_role: Trading Architecture
    next_action: Asset-Freigabe und Tests pro Asset-Familie mit Evidence verknuepfen.
    notes: Multi-Asset erweitert den Risk-Scope und darf Live nicht erleichtern.

  - id: instrument_catalog
    title: Instrument Catalog
    description: Instrumente brauchen eindeutige Identitaet, Precision, Marktfamilie, Session- und Exchange-Metadaten.
    target_10_10: Der Katalog ist aktuell, pruefbar, cached und blockiert unbekannte oder unvollstaendige Instrumente.
    required_evidence:
      - Katalogvertrag dokumentiert.
      - Tests fuer unbekannte Instrumente und Precision.
      - Runtime-Health fuer Katalogfrische.
    evidence_files:
      - docs/bitget-config.md
      - shared/python/src/shared_py/bitget/instruments.py
    required_commands:
      - pytest shared/python/tests -q
    status: implemented
    blocks_live_trading: true
    severity: P0
    owner_role: Market Data / Trading Architecture
    next_action: Katalogfrische und Exchange-Abgleich als Release-Evidence ablegen.
    notes: Fehlender Katalog ist ein harter Fail-closed-Grund.

  - id: asset_quarantine_and_delisting
    title: Asset Quarantine and Delisting
    description: Assets muessen bei Delisting, unklarer Exchange-Truth, schlechter Datenqualitaet oder Risk-Auffaelligkeit quarantined werden.
    target_10_10: Quarantine verhindert Subscribe, Signal und Live-Order pro Asset, bis Evidence wieder gruen ist.
    required_evidence:
      - Quarantine-Policy pro Asset.
      - Tests fuer Delisting und no-trade.
      - Audit-Trail fuer Quarantine-Entscheidungen.
    evidence_files:
      - docs/bitget-config.md
      - docs/production_10_10/no_go_rules.md
    required_commands:
      - pytest tests/unit -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Risk Governance / Market Data
    next_action: Asset-Quarantine-Modell und Fail-closed-Tests ergaenzen.
    notes: Delisting darf niemals still zu Fallback-Trading fuehren.

  - id: market_data_quality_per_asset
    title: Market Data Quality per Asset
    description: Pro Asset muessen Frische, Luecken, Providerfehler, Timestamps und Exchange-Truth bewertet werden.
    target_10_10: Stale oder inkonsistente Daten blockieren Signal, Sizing und Live-Order asset-spezifisch.
    required_evidence:
      - Datenqualitaetsregeln pro Asset.
      - Fault-Injection-Tests.
      - Monitor- und Alert-Evidence fuer stale data.
    evidence_files:
      - docs/production_10_10/market_data_quality_per_asset.md
      - shared/python/src/shared_py/market_data_quality.py
      - scripts/asset_data_quality_report.py
      - tools/check_market_data_quality.py
      - tests/data/test_market_data_quality_contracts.py
      - tests/security/test_market_data_quality_live_blocking.py
      - tests/scripts/test_asset_data_quality_report.py
      - tests/tools/test_check_market_data_quality.py
    required_commands:
      - python tools/check_market_data_quality.py --strict
      - pytest tests/data/test_market_data_quality_contracts.py -q
      - pytest tests/security/test_market_data_quality_live_blocking.py -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Market Data / SRE
    next_action: Per-Asset-Datenqualitaetsmatrix und Tests an Live-Broker-Gates koppeln.
    notes: Datenqualitaet ist ein Live-Gate, kein Dashboard-Hinweis.

  - id: liquidity_spread_slippage_per_asset
    title: Liquidity, Spread and Slippage per Asset
    description: Spread, Tiefe, Ticksize, erwartete Slippage und Ausfuehrbarkeit muessen pro Asset bewertet werden.
    target_10_10: Illiquide oder zu teure Assets werden vor Sizing und Order-Submit blockiert.
    required_evidence:
      - Liquiditaets- und Spread-Regeln.
      - Exit-/Sizing-Tests mit Ticksize und Tiefe.
      - Slippage-Report pro Asset-Klasse.
    evidence_files:
      - README.md
      - docs/risk_governor.md
      - docs/portfolio_risk_governor.md
    required_commands:
      - pytest tests/unit/risk_engine -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Risk Governance / Trading
    next_action: Liquiditaetsgate pro Asset-Klasse maschinenlesbar machen.
    notes: Enge Stops sind nur mit Ausfuehrbarkeit valide.

  - id: asset_risk_tiers
    title: Asset Risk Tiers
    description: Assets brauchen Risk-Tiers fuer Leverage, Max-Exposure, Volatilitaet, Liquiditaet und News-/Regime-Risiko.
    target_10_10: Jedes handelbare Asset hat einen freigegebenen Risk-Tier; unbekannte Tiers blockieren Live.
    required_evidence:
      - Risk-Tier-Definitionen.
      - Tests fuer unknown-tier no-trade.
      - Owner-Freigabe fuer Tier-Aenderungen.
    evidence_files:
      - docs/production_10_10/asset_risk_tiers_and_order_sizing.md
      - docs/risk_governor.md
      - docs/portfolio_risk_governor.md
      - shared/python/src/shared_py/asset_risk_tiers.py
      - tools/check_asset_risk_tiers.py
      - tests/tools/test_check_asset_risk_tiers.py
      - tests/risk/test_asset_risk_tiers.py
      - tests/security/test_multi_asset_order_sizing_live_blocking.py
    required_commands:
      - python tools/check_asset_risk_tiers.py --strict
      - pytest tests/tools/test_check_asset_risk_tiers.py -q
      - pytest tests/risk/test_asset_risk_tiers.py -q
      - pytest tests/security/test_multi_asset_order_sizing_live_blocking.py -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Risk Governance
    next_action: Asset-Risk-Tier-Datei und Validator erstellen.
    notes: BTC-Regeln duerfen nicht still auf alle Assets kopiert werden.

  - id: multi_asset_order_sizing
    title: Multi-Asset Order Sizing
    description: Ordergroessen muessen pro Asset Precision, Mindestgroesse, Hebel, Liquidation, Exposure und Portfolio-Kontext beachten.
    target_10_10: Sizing ist deterministisch, testbar und blockiert ungueltige Precision, Ueberhebelung oder Exposure.
    required_evidence:
      - Sizing-Vertrag.
      - Tests fuer Precision, Min-Notional und Exposure.
      - Auditierbare Sizing-Entscheidung.
    evidence_files:
      - docs/risk_governor.md
      - docs/live_broker.md
    required_commands:
      - pytest tests/unit/live_broker -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Trading / Risk Governance
    next_action: Multi-Asset-Sizing-Evidence pro Asset-Klasse ergaenzen.
    notes: Sizing darf nicht nur global oder BTC-zentriert sein.

  - id: portfolio_risk
    title: Portfolio Risk
    description: Gesamtportfolio, Korrelation, Exposure, Drawdown und offene Orders muessen vor jeder Live-Order beruecksichtigt werden.
    target_10_10: Portfolio-Risk blockiert jede Order, die Limits, Korrelation oder Drawdown-Regeln verletzt.
    required_evidence:
      - Portfolio-Risk-Governor dokumentiert.
      - Exposure- und Drawdown-Tests.
      - Owner-freigegebene Limits.
    evidence_files:
      - docs/portfolio_risk_governor.md
      - docs/risk_governor.md
    required_commands:
      - pytest tests/integration/test_portfolio_exposure_guard.py -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Risk Governance
    next_action: Owner-Limits und aktuelle Test-Evidence fuer Portfolio-Risk archivieren.
    notes: Einzelasset-Freigabe reicht ohne Portfolio-Kontext nicht.

  - id: strategy_validation_per_asset_class
    title: Strategy Validation per Asset Class
    description: Strategien muessen pro Marktfamilie und Asset-Klasse validiert werden, nicht pauschal aus BTC abgeleitet.
    target_10_10: Jede Asset-Klasse hat Backtest-, Shadow- und Drift-Evidence vor Live-Freigabe.
    required_evidence:
      - Backtest-/Replay-Berichte pro Asset-Klasse.
      - Shadow-Evidence pro Asset-Klasse.
      - Modell-/Strategie-Lineage.
    evidence_files:
      - docs/model_stack_v2.md
      - docs/shadow_burn_in_ramp.md
    required_commands:
      - python tools/backtest/run_backtest.py --help
      - pytest tests/unit/signal_engine -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Quant / Trading
    next_action: Asset-Klassen-Validierungsberichte erzeugen und verlinken.
    notes: LLM erklaert nur unterstuetzend und ist nicht alleiniger Trading-Kern.

  - id: live_broker_fail_closed
    title: Live Broker Fail-Closed
    description: Der Live-Broker darf echte Orders nur nach vollstaendiger Gate-Kette senden.
    target_10_10: Providerfehler, fehlende Gates, Timeout, Redis/DB-Ausfall und unklare Exchange-Truth blockieren.
    required_evidence:
      - Live-Broker-Gate-Doku.
      - Unit- und Integrationstests fuer Fail-closed.
      - Live-Mirror-Gate-Matrix.
    evidence_files:
      - docs/live_broker.md
      - docs/production_10_10/09_live_mirror_gate_matrix.md
      - docs/production_10_10/no_go_rules.md
    required_commands:
      - pytest tests/unit/live_broker -q
    status: implemented
    blocks_live_trading: true
    severity: P0
    owner_role: Live Broker / Risk Governance
    next_action: Aktuelle Gate-Test-Evidence mit dieser Matrix verknuepfen.
    notes: Implementiert bedeutet nicht live-freigegeben.

  - id: order_idempotency
    title: Order Idempotency
    description: Order-Submit, Replace und Cancel brauchen Idempotency, Duplicate-Protection und nachvollziehbare Client-IDs.
    target_10_10: Doppelte oder wiederholte Requests erzeugen keine mehrfachen echten Orders.
    required_evidence:
      - Idempotency-Vertrag.
      - Duplicate-Recovery-Tests.
      - Audit-Trail fuer Order-IDs.
    evidence_files:
      - docs/live_broker.md
      - docs/production_10_10/no_go_rules.md
      - docs/production_10_10/live_safety_drill.md
      - scripts/live_safety_drill.py
      - tests/scripts/test_live_safety_drill.py
    required_commands:
      - python scripts/live_safety_drill.py --dry-run
      - pytest tests/unit/live_broker -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Live Broker
    next_action: Order-Idempotency-Report und Tests explizit referenzieren.
    notes: Idempotency-Unsicherheit ist ein Echtgeld-Blocker.

  - id: reconcile_safety
    title: Reconcile Safety
    description: Reconcile muss lokale Orders, Broker-State und Exchange-Truth abgleichen und Divergenzen blockieren.
    target_10_10: Jede offene Divergenz fuehrt zu Safety-Latch oder No-Trade, bis sie geloest ist.
    required_evidence:
      - Reconcile-Runbook.
      - Divergenz-Tests.
      - Exchange-Truth-Drill.
    evidence_files:
      - docs/live_broker.md
      - docs/production_10_10/no_go_rules.md
    required_commands:
      - pytest tests/unit/live_broker -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Live Broker / Operations
    next_action: Reconcile-Divergenz-Evidence und Runbook konsolidieren.
    notes: Ungeklaerte Exchange-Order-States blockieren Live.

  - id: kill_switch_safety_latch
    title: Kill Switch and Safety Latch
    description: Kill-Switch und Safety-Latch muessen jede Live-Aktion verhindern, wenn aktiv oder ungeklaert.
    target_10_10: Aktivierte oder stale Safety-Zustaende blockieren Order-Submit, Replace und Cancel gemaess Policy.
    required_evidence:
      - Kill-Switch-Tests.
      - Safety-Latch-Tests.
      - Drill-Report.
    evidence_files:
      - docs/live_broker.md
      - docs/production_10_10/no_go_rules.md
    required_commands:
      - pytest tests/unit/live_broker -q
    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: Operations / Risk Governance
    next_action: Drill-Evidence fuer Kill-Switch und Safety-Latch archivieren.
    notes: Safety-Zustaende duerfen nie als Warnung ohne Block enden.

  - id: emergency_flatten
    title: Emergency Flatten
    description: Notfall-Glattstellung braucht klare Operator-/Owner-Freigabe, Exchange-Truth und Audit-Trail.
    target_10_10: Emergency Flatten ist getestet, fail-closed und als Runbook mit Drill-Evidence vorhanden.
    required_evidence:
      - Emergency-Flatten-Runbook.
      - Drill-Report.
      - Tests fuer Freigabe und Audit.
    evidence_files:
      - docs/production_10_10/no_go_rules.md
      - docs/LaunchChecklist.md
      - docs/production_10_10/live_safety_drill.md
      - scripts/live_safety_drill.py
      - tests/scripts/test_live_safety_drill.py
    required_commands:
      - python scripts/live_safety_drill.py --dry-run
      - pytest tests/unit/live_broker -q
    status: external_required
    blocks_live_trading: true
    severity: P0
    owner_role: Operations / Owner
    next_action: Emergency-Flatten-Drill mit Git-SHA, Umgebung und PASS erzeugen.
    notes: Externe Drill-Evidence fehlt.

