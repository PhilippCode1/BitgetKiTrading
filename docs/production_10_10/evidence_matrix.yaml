    status: partial
    blocks_live_trading: true
    severity: P0
    owner_role: SRE / Database Operations
    next_action: Staging-Restore mit RTO/RPO und PASS erzeugen.
    notes: Backup ohne Restore-Nachweis ist nicht ausreichend.

  - id: shadow_burn_in
    title: Shadow Burn-in
    description: Shadow muss vor Live gegen reale Marktbedingungen laufen, ohne echte Orders.
    target_10_10: 72h+ Shadow-Report oder signierte Ausnahme mit PASS, SHA256, Git-SHA und Umgebung liegt vor.
    required_evidence:
      - Shadow-Burn-in-Report.
      - Divergenz-Auswertung.
      - Risk- und Signal-Evidence.
    evidence_files:
      - docs/shadow_burn_in_ramp.md
      - docs/production_10_10/04_shadow_burn_in_certificate.md
