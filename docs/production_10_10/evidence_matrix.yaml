  - id: backup_restore
    title: Backup and Restore
    description: Backups muessen verschluesselt, auffindbar, wiederherstellbar und getestet sein.
    target_10_10: Restore aus realem Backup hat PASS, RTO/RPO und Git-SHA.
    required_evidence:
      - Backup-Policy.
      - Restore-Report.
      - DB-/Migration-Smokes.
    evidence_files:
      - docs/recovery_runbook.md
      - docs/production_10_10/03_postgres_restore_drill.md
